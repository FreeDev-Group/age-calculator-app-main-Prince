<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <!-- displays site properly based on user's device -->

    <link
      rel="icon"
      type="image/png"
      sizes="32x32"
      href="./assets/images/favicon-32x32.png"
    />

    <title>Frontend Mentor | Age calculator app</title>

    <!-- Feel free to remove these styles or customise in your own stylesheet 👍 -->
    <link rel="stylesheet" href="./assets/styles/style.css" />
  </head>
  <body>
    <div class="container">
      <div class="card">
        <div class="form-group">
          <div id="day-section" class="form-section">
            <label for="day">DAY</label>
            <input type="number" id="day" placeholder="DD" />
            <span id="error-day" class=""></span>
          </div>

          <div id="month-section" class="form-section">
            <label for="month">MONTH</label>
            <input type="number" id="month" placeholder="MM" />
            <span id="error-month" class=""></span>
          </div>

          <div id="year-section" class="form-section">
            <label for="year">YEAR</label>
            <input type="number" id="year" placeholder="YYYY" />
            <span id="error-year" class=""></span>
          </div>
        </div>

        <div class="form-button-layer form-group">
          <button onclick="errorHandler()">
            <img src="./assets/images/icon-arrow.svg" alt="Arrow" />
          </button>
        </div>

        <div class="result">
          <p><span id="years" class="result-value">--</span> years</p>
          <p><span id="months" class="result-value">--</span> months</p>
          <p><span id="days" class="result-value">--</span> days</p>
        </div>
      </div>
    </div>

    <div class="attribution">
      Challenge by
      <a href="https://www.frontendmentor.io?ref=challenge" target="_blank"
        >Frontend Mentor</a
      >. Coded by
      <a href="https://github.com/hacp0102/age-calculator-app-main-Prince"
        >Prince'i</a
      >.
    </div>

    <script src="./assets/js/script.js"></script>
  </body>
</html>
